<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title> Avocado Garden </title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* FONDO */
body{
  font-family:'Segoe UI', sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('avocado.jpg') no-repeat center center fixed;
  background-size: cover;
  min-height:100vh;
  overflow-x:hidden;
}

#menuToggle{
  position: fixed;
  top:15px;
  left:15px;

  width:75px;
  height:75px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);

  border-radius:18px;

  cursor:pointer;
  z-index:1000;

  transition:0.3s;
}

#menuToggle:hover{
  transform:scale(1.08);
}

/* 🔥 ICONO LIMPIO */
#menuToggle img{
  width:80px;
  height:80px;
  object-fit:contain;

  /* 💀 ESTO QUITA FONDOS FEOS */
  mix-blend-mode: multiply;

  margin-bottom:5px;
}

/* TEXTO */
#menuToggle p{
  margin:0;
  font-size:12px;
  color:white;
}
/* OVERLAY */
#overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:998;
}
#overlay.active{
  opacity:1;
  visibility:visible;
}

/* SIDEBAR */
aside{
  position: fixed;
  width:260px;
  height:100vh;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(12px);
  color:white;
  padding:20px;
  transform:translateX(-100%);
  transition:0.3s;
  z-index:999;
  box-shadow:5px 0 20px rgba(0,0,0,0.4);
}
aside.active{
  transform:translateX(0);
}
aside h3{ margin-bottom:10px; }
aside p{
  font-size:14px;
  opacity:0.8;
  margin-bottom:15px;
}
aside button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background: rgba(255,255,255,0.08);
  color:white;
  cursor:pointer;
  transition:0.3s;
}
aside button:hover{
  background: linear-gradient(135deg,#2ecc71,#27ae60);
  transform:translateX(5px);
}

/* CONTENIDO */
main{
  margin-top:80px;
  padding:20px;
  width:100%;
}

/* CARDS PRO */
.card{
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:white;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* LOGIN  */
#login{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding:30px;
  border-radius:20px;
  text-align:center;
  color:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
#login input{
  width:200px;
  padding:10px;
  margin:8px;
  border:none;
  border-radius:10px;
}
#login button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#27ae60;
  color:white;
  cursor:pointer;
}

/* ANIMACIÓN */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="menuToggle" onclick="toggleMenu()">
  <img src="icono.png" class="menu-icon">
  <p>Menú</p>
</div>

<aside id="menu">
  <h3>Contenido Garden</h3>
  <p id="rol"></p>
  <button onclick="show('home')">Inicio</button>
  <button id="invBtn" onclick="show('inventory')">Inventario</button>
  <button onclick="show('shop')">Tienda</button>
  <button onclick="show('cart')">Carrito (<span id="cartCount">0</span>)</button>
  <button onclick="showLogin()">Admin</button>
  <button onclick="logout()">Salir</button>
</aside>

<div id="login" style="display:none;">
  <h2>Login</h2>
  <input id="userInput" placeholder="Usuario"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>
  <button onclick="login()">Entrar</button>
</div>

<main id="content"></main>

<script>

let user = JSON.parse(localStorage.getItem('user')) || {r:'Cliente'};
let inventory = JSON.parse(localStorage.getItem('inv')) || [];
let cart = JSON.parse(localStorage.getItem('cart')) || [];

const users = [
  {u:'admin',p:'123',r:'Administrador'},
  {u:'cliente',p:'123',r:'Cliente'}
];

function toggleMenu(){
  menu.classList.toggle('active');
  overlay.classList.toggle('active');
}

function save(){ localStorage.setItem('inv', JSON.stringify(inventory)); }
function saveCart(){ localStorage.setItem('cart', JSON.stringify(cart)); }
function saveUser(){ localStorage.setItem('user', JSON.stringify(user)); }

window.onload = function(){
  rol.innerText = "Modo: " + user.r;
  cartCount.innerText = cart.length;
  invBtn.style.display = user.r === 'Cliente' ? 'none' : 'block';
  show('home');
};

/* LOGIN */
function showLogin(){ login.style.display='block'; }

function login(){
  let u = userInput.value;
  let p = pass.value;
  let found = users.find(x=>x.u===u && x.p===p);

  if(found){
    user = found;
    saveUser();
    location.reload();
  }else{
    alert('Error');
  }
}

function logout(){
  localStorage.removeItem('user');
  location.reload();
}

/* VISTAS */
function show(view){
  let c = content;

  
   if(view==='home'){
  c.innerHTML = `
  <div style="
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
    width:100%;
  ">
    
    <div style="
      width:90%;
      max-width:500px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      padding:40px;
      border-radius:25px;
      text-align:center;
      animation:fadeIn 0.5s;
      color:white;
      box-shadow:0 15px 40px rgba(0,0,0,0.5);
    ">

      <img src="icono.png" style="
        width:200px;
        height:200px;
        object-fit:cover;
        border-radius:20px;
        margin-bottom:15px;
      ">

      <h1 style="font-size:28px;margin-bottom:10px;">
         Avocado Garden
      </h1>

      <p style="opacity:0.8;font-size:16px;">
        Bienvenido ${user.r}
      </p>

      <button onclick="show('shop')" style="
        margin-top:20px;
        padding:15px;
        font-size:16px;
        border:none;
        border-radius:15px;
        background:linear-gradient(135deg,#2ecc71,#27ae60);
        color:white;
        cursor:pointer;
        width:100%;
      ">
        Ir a tienda 
      </button>

    </div>

  </div>`;
}

  if(view==='inventory' && user.r!=='Cliente'){
    c.innerHTML = `
    <h2 style="color:white;">Inventario</h2>
    <input id="n" placeholder="Nombre">
    <input id="p" type="number" placeholder="Precio">
    <input id="s" type="number" placeholder="Stock">
    <button onclick="addProduct()">Agregar</button>
    <div id="inv"></div>`;
    renderInventory();
  }

  if(view==='shop'){
    c.innerHTML = `<h2 style="color:white;">Tienda</h2><div id="shop"></div>`;
    renderShop();
  }

  if(view==='cart'){
    c.innerHTML = `
    <h2 style="color:white;">Carrito</h2>
    <div id="cart"></div>
    <div class="total" id="totalDiv"></div>
    <button onclick="checkout()">Comprar</button>`;
    renderCart();
  }
}

/* FUNCIONES */
function addProduct(){
  let name = document.getElementById('n').value;
  let price = parseInt(document.getElementById('p').value);
  let stock = parseInt(document.getElementById('s').value);

  if(!name || !price || !stock) return alert('Completa todo');

  inventory.push({id:Date.now(), name, price, stock});
  save();
  renderInventory();
}

function renderInventory(){
  inv.innerHTML='';
  inventory.forEach(p=>{
    inv.innerHTML+=`
    <div class="card">
      ${p.name} - $${p.price}
      <button onclick="del(${p.id})">❌</button>
    </div>`;
  });
}

function del(id){
  inventory = inventory.filter(p=>p.id!==id);
  save();
  renderInventory();
}

function renderShop(){
  shop.innerHTML='';
  inventory.forEach(p=>{
    shop.innerHTML+=`
    <div class="card">
      ${p.name} - $${p.price}
      <button onclick="addCart(${p.id})">Agregar</button>
    </div>`;
  });
}

function addCart(id){
  let p = inventory.find(x=>x.id===id);
  if(!p || p.stock<=0) return alert('Sin stock');

  cart.push(p);
  saveCart();
  cartCount.innerText = cart.length;
}

function renderCart(){
  let total=0;
  cart.innerHTML='';
  cart.forEach((p,i)=>{
    total+=p.price;
    cart.innerHTML+=`
    <div class="card">
      ${p.name} - $${p.price}
      <button onclick="removeCart(${i})">X</button>
    </div>`;
  });
  totalDiv.innerText = "Total: $" + total;
}

function removeCart(i){
  cart.splice(i,1);
  saveCart();
  renderCart();
  cartCount.innerText = cart.length;
}

function checkout(){
  alert('Compra hecha 🔥');
  cart=[];
  saveCart();
  cartCount.innerText=0;
  show('shop');
}

</script>

</body>
</html>
